# GameAP Daemon configuration

# ------------------------------------------------------------------
# Node
# ------------------------------------------------------------------

# Dedicated server ID (required, must match the node ID in GameAP panel)
ds_id: 1

# ------------------------------------------------------------------
# Listener
# ------------------------------------------------------------------

listen_ip: 0.0.0.0
# listen_port: 31717

# ------------------------------------------------------------------
# GameAP API
# ------------------------------------------------------------------

api_host: http://localhost:2080
api_key: KxL6shP6Q4aEJeLXIaoe8mXpkIrTTFSQMKWt1qAfBZ2TQe42YvzDzrlwVZ2F5pgH

# ------------------------------------------------------------------
# Authentication
# ------------------------------------------------------------------

daemon_login: sEcreT-L0gin
daemon_password: seCrEt-PaSSW0rD

# Enable login/password authentication for the daemon RPC (default: false).
# password_authentication: false

# ------------------------------------------------------------------
# TLS / Certificates
# Relative paths are resolved against the config file directory.
# ------------------------------------------------------------------

# Certificates can be specified as file paths:
ca_certificate_file: ./certs_panel/ca.crt
certificate_chain_file: ./certs_panel/server.crt
private_key_file: ./certs_panel/server.key

# Or as inline PEM values (takes precedence over file paths):
# ca_certificate: |
#   -----BEGIN CERTIFICATE-----
#   MIIDPTCCAiWgAwIBAgIRAIy/eAu45373SY5SxmS8HsowDQYJKoZIhvcNAQELBQAw
#   ...
#   -----END CERTIFICATE-----
# certificate_chain: |
#   -----BEGIN CERTIFICATE-----
#   MIIDPTCCAiWgAwIBAgIRAIy/eAu45373SY5SxmS8HsowDQYJKoZIhvcNAQELBQAw
#   ...
#   -----END CERTIFICATE-----
# private_key: |
#   -----BEGIN PRIVATE KEY-----
#   MIIEvgIBADANBgkqhkiG9w0BAQEFAASCBKgwggSkAgEAAoIBAQCaJGeZltblsjgD
#   ...
#   -----END PRIVATE KEY-----

# If your private key is encrypted, you can specify the password here:
# private_key_password: abracadabra

dh_file: /etc/gameap-daemon/certs_panel/dh2048.pem

# ------------------------------------------------------------------
# Statistics
# ------------------------------------------------------------------

# Network interfaces and disk mounts reported in node metrics.
# Leave empty (or remove) to auto-select physical, non-loopback interfaces
# and the root "/" filesystem plus the work_path drive.
if_list:
  - eth0
  - eth1

drives_list:
  - /
  - /home/server

stats_update_period: 60
stats_db_update_period: 300

# ------------------------------------------------------------------
# Logging
# log_level is parsed by the first character: trace / debug / info /
# warning / error / fatal. Default: info.
# ------------------------------------------------------------------

# output_log: /var/log/gameap-daemon/output.log
# error_log: /var/log/gameap-daemon/error.log
log_level: debug

# ------------------------------------------------------------------
# Game server paths
# ------------------------------------------------------------------

# Base directory where game servers are installed.
# work_path: /srv/gameap

# Directory for additional tools (added to PATH). Defaults to {work_path}/tools.
# tools_path: /srv/gameap/tools

# Path to the steamcmd executable used for game installations.
# steamcmd_path: /srv/gameap/steamcmd/steamcmd.sh

# Windows-only paths:
# path_7zip: C:\gameap\tools\7zip\7za.exe
# path_starter: C:\gameap\daemon\gameap-starter.exe

# ------------------------------------------------------------------
# Steam credentials (optional; leave empty for anonymous SteamCMD)
# ------------------------------------------------------------------

# steam_config:
#   login: your-steam-user
#   password: your-steam-pass

# ------------------------------------------------------------------
# Task manager
# ------------------------------------------------------------------

# task_manager:
#   update_period: 1s       # how often to poll the API for new tasks
#   run_task_period: 10ms   # delay between dequeued task executions
#   workers_count: 4

# ------------------------------------------------------------------
# Metrics
# Pull-mode Prometheus-like metrics (cpu, ram, network, disk, ...) are
# exposed to the panel over the gRPC bidi stream. The daemon collects
# samples on a tick and keeps them in an in-memory ring buffer; the
# panel pulls either the latest snapshot or a recent history window.
# ------------------------------------------------------------------

# metrics:
#   enabled: true                  # default: true (set to false to disable)
#   collection_interval: 5s        # default: 5s
#   retention_duration: 10m        # default: 10m, clamped to [10m, 60m]

# ------------------------------------------------------------------
# Process manager
# Choose one backend. Available values:
#   Linux/macOS: tmux (default), systemd, simple, docker, podman
#   Windows:     winsw (default), shawl, simple, docker
# The `config` block provides defaults that are overridden by
# server.Vars / GameMod.Metadata / Game.Metadata (in that order).
# ------------------------------------------------------------------

# --- tmux (Linux/macOS, default) ----------------------------------
# process_manager:
#   name: tmux

# --- systemd (Linux) -----------------------------------------------
# Default scope is "system": units written to /etc/systemd/system,
# requires root (or polkit rules) to manage units. Game servers run
# under the User= / Group= named in their panel record.
# process_manager:
#   name: systemd

# --- systemd, user-mode (Linux) ------------------------------------
# Daemon runs under a regular user; all game servers run under that
# same user — systemctl --user cannot switch identities.
# Requirements:
#   - daemon process owned by a regular (non-root) user
#   - lingering enabled for that user:  sudo loginctl enable-linger <user>
#   - XDG_RUNTIME_DIR available (auto-resolved from /run/user/<uid>)
# Units are written to ~/.config/systemd/user/ and managed via
# `systemctl --user`. If a panel-side server.user differs from the
# daemon's OS user, start/restart/uninstall fail with ErrUserMismatch.
# process_manager:
#   name: systemd
#   config:
#     scope: user

# --- simple (all platforms) ----------------------------------------
# process_manager:
#   name: simple

# --- docker (all platforms) ----------------------------------------
# process_manager:
#   name: docker
#   config:
#     image: debian:bookworm-slim
#     network_mode: bridge
#     dns: 8.8.8.8,1.1.1.1
#     workdir: /server
#     # capabilities: NET_RAW,SYS_NICE
#     # privileged: "false"
#     # memory_limit: 2g
#     # cpu_limit: "1.0"
#     # volumes: '["/shared/maps:/server/maps:ro"]'
#     # installation_image: ghcr.io/parkervcp/installers:alpine
#     # installation_entrypoint: ash
#     # installation_user: root

# --- podman (Linux/macOS) ------------------------------------------
# process_manager:
#   name: podman
#   config:
#     image: debian:bookworm-slim
#     # Rootless default: unix:///run/user/<UID>/podman/podman.sock
#     # Root default:     unix:///run/podman/podman.sock
#     socket_path: unix:///run/user/1000/podman/podman.sock

# --- winsw (Windows) -----------------------------------------------
# process_manager:
#   name: winsw

# --- shawl (Windows) -----------------------------------------------
# process_manager:
#   name: shawl

# ------------------------------------------------------------------
# Windows: users map used by winsw/shawl to start services under a
# local account. Key = OS user, value = password (prefix with
# "base64:" to store the password base64-encoded).
# ------------------------------------------------------------------

# users:
#   gameap: base64:cGFzc3dvcmQ=
#   srcds: MySecretPassword

# If true, Windows services run under "NT AUTHORITY\NETWORK SERVICE"
# and the `users` map is ignored. Default: false.
# use_network_service_user: false
